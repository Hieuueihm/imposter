<div id="nameInput" class="hidden"></div>

<div id="game" class="hidden">

    <div id="roleDisplay" class="card hidden"></div>
    <button onclick="nextPlayer()" class="hidden" id="nextBtn">Người tiếp theo</button>
</div>

<div id="announceStart" class="hidden">
    <h2 id="startPlayerText"></h2>

</div>

<div id="end" class="hidden">

    <button onclick="startNewRound()">Chơi vòng mới</button>

let players = [];
let roles = [];
let currentIndex = 0;
let totalPlayers = 0;
let totalImposters = 0;
let selectedWord = null;
let selectedFields = [];
let startPlayerIndex = 0;
let usedWords = [];
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function createNameInputs() {
    totalPlayers = parseInt(document.getElementById("players").value);
    totalImposters = parseInt(document.getElementById("imposters").value);

    if (!totalPlayers || !totalImposters || totalImposters >= totalPlayers) {
        alert("Kiểm tra lại số người và số imposter!");
        return;
    }

    document.getElementById("setup").classList.add("hidden");

    let container = document.getElementById("nameInput");
    container.innerHTML = "<h3>Nhập tên người chơi</h3>";

    for (let i = 0; i < totalPlayers; i++) {
        container.innerHTML +=
            `<input type="text" id="player${i}" placeholder="Tên người ${i+1}"><br>`;
    }

    container.innerHTML += `<button onclick="prepareFieldSelect()">Tiếp tục</button>`;
    container.classList.remove("hidden");
}

function prepareFieldSelect() {
    players = [];

    for (let i = 0; i < totalPlayers; i++) {
        let name = document.getElementById("player"+i).value;
        if (!name) {
            alert("Vui lòng nhập đủ tên!");
            return;
        }
        players.push(name);
    }

    document.getElementById("nameInput").classList.add("hidden");

    let uniqueFields = [...new Set(wordList.map(w => w.field))];
    let container = document.getElementById("fieldCheckboxes");
    container.innerHTML = "";

    uniqueFields.forEach(field => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${field}">
                ${field}
            </label><br>
        `;
    });

    document.getElementById("fieldSelect").classList.remove("hidden");
}

function startGame() {

    let checkedBoxes = document.querySelectorAll(
        "#fieldCheckboxes input:checked"
    );

    if (checkedBoxes.length === 0) {
        alert("Vui lòng chọn ít nhất 1 lĩnh vực!");
        return;
    }

    selectedFields = [];
    checkedBoxes.forEach(box => {
        selectedFields.push(box.value);
    });

    let filteredWords = wordList.filter(w =>
        selectedFields.includes(w.field)
    );

    selectedWord = getRandomWord(filteredWords);

    roles = [];
    for (let i = 0; i < totalImposters; i++) roles.push("imposter");
    for (let i = totalImposters; i < totalPlayers; i++) roles.push("normal");
    roles = shuffle(roles);

    currentIndex = 0;

    document.getElementById("fieldSelect").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    document.getElementById("playerTurn").innerText =
        players[currentIndex];
}
function getRandomWord(filteredWords) {

    let availableWords = filteredWords.filter(w =>
        !usedWords.includes(w.key)
    );

    // Nếu hết từ thì reset
    if (availableWords.length === 0) {
        usedWords = [];
        availableWords = filteredWords;
    }

    let randomWord = availableWords[
        Math.floor(Math.random() * availableWords.length)
    ];

    usedWords.push(randomWord.key);

    return randomWord;
}
function showRole() {
    let display = document.getElementById("roleDisplay");

    if (roles[currentIndex] === "imposter") {
        display.innerText =
            players[currentIndex] +
            "\n\nIMPOSTER\n\nHint: " +
            selectedWord.hint;
    } else {
        display.innerText =
            players[currentIndex] +
            "\n\nNgười thường\n\nKey: " +
            selectedWord.key;
    }

    display.classList.remove("hidden");
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextPlayer() {
    document.getElementById("roleDisplay").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    currentIndex++;

    if (currentIndex >= totalPlayers) {
        chooseStartPlayer();
        return;
    }

    document.getElementById("playerTurn").innerText =
        players[currentIndex];
}

function chooseStartPlayer() {
    startPlayerIndex = Math.floor(Math.random() * totalPlayers);

    document.getElementById("game").classList.add("hidden");
    document.getElementById("announceStart").classList.remove("hidden");

    document.getElementById("startPlayerText").innerText =
        players[startPlayerIndex] + " sẽ là người START!";
}

function goToEnd() {
    document.getElementById("announceStart").classList.add("hidden");
    document.getElementById("end").classList.remove("hidden");

    let resultText = "<h3>Key: " + selectedWord.key + "</h3><br>";

    for (let i = 0; i < totalPlayers; i++) {
        if (roles[i] === "imposter") {
            resultText += players[i] + " là IMPOSTER<br>";
        }
    }

    document.getElementById("result").innerHTML = resultText;
}

function startNewRound() {

    let filteredWords = wordList.filter(w =>
        selectedFields.includes(w.field)
    );


    selectedWord = getRandomWord(filteredWords);

    roles = [];
    for (let i = 0; i < totalImposters; i++) roles.push("imposter");
    for (let i = totalImposters; i < totalPlayers; i++) roles.push("normal");
    roles = shuffle(roles);

    currentIndex = 0;

    document.getElementById("end").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("playerTurn").innerText = players[currentIndex];
}
